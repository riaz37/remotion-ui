# Project-scoped Codex configuration for RemotionUI.
# Codex loads this file only when the repository is trusted.

# Keep repo guidance compact but allow AGENTS.md plus focused nested guidance if added later.
project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["TEAM_GUIDE.md"]

[mcp_servers.vercel]
url = "https://mcp.vercel.com"
enabled = true
startup_timeout_sec = 10
tool_timeout_sec = 60
