name: Bug report
description: Something isn't working in the CLI, registry, or docs site
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Include steps to reproduce and the version of `remotion-ui` if relevant.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Commands, component names, or doc URLs involved.
      placeholder: |
        1. Run `npx remotion-ui@latest add fade-in`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: remotion-ui version
      placeholder: e.g. 0.2.2

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Registry / components
        - Docs site
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Remotion version
      placeholder: macOS 15, Node 22, Remotion 4.0.473
