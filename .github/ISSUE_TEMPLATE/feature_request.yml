name: Feature request
description: Suggest a new component, CLI command, or docs improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're solving and the smallest useful version of the feature.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Primitive
        - Scene
        - Composition
        - CLI
        - Docs
        - Registry tooling
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to open a PR for this
          required: false
