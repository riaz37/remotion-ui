name: Publish CLI

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "npm publish --dry-run (no upload)"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      NPM_CONFIG_PROVENANCE: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Preflight publish prep (without dry-run upload)
        run: |
          VERSION="$(node -p "require('./packages/remotion-ui/package.json').version")"
          awk -v ver="$VERSION" '
            /^## / { if ($2 == ver) found=1 }
            END { exit found ? 0 : 1 }
          ' CHANGELOG.md
          pnpm registry:build
          node -e "
            const count = require('./apps/web/public/r/index.json').items.length;
            if (count < 100) {
              console.error('Registry item count too low:', count);
              process.exit(1);
            }
            console.log('Registry items:', count);
          "

      - name: Build CLI
        run: pnpm --filter remotion-ui build

      - name: Test CLI
        run: pnpm --filter remotion-ui test

      - name: Publish remotion-ui (dry run)
        if: inputs.dry_run
        working-directory: packages/remotion-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --dry-run

      - name: Publish remotion-ui
        if: ${{ !inputs.dry_run }}
        working-directory: packages/remotion-ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Verify published CLI version
        if: ${{ !inputs.dry_run }}
        run: npx --yes remotion-ui@latest --version

      - name: Verify published registry search
        if: ${{ !inputs.dry_run }}
        run: npx --yes remotion-ui@latest search -q caption
